<!DOCTYPE html>
<html>
<head>
    <title>BMI & Calorie Calculator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
<h2>BMI & Calorie Calculator</h2>

<form action="/calculate" method="POST">

    <label>Age:</label>
    <input type="number" name="age" required>

    <label>Weight (kg):</label>
    <input type="number" name="weight" step="0.1" required>

    <label>Height (cm):</label>
    <input type="number" name="height" step="0.1" required>

    <label>Activity Level:</label>
    <select name="activity">
    <option value="no">No Exercise</option>
    <option value="light">Light Exercise (1-2 days/week)</option>
    <option value="medium">3 Days/Week</option>
    <option value="high">Daily Exercise</option>
</select>

    <button type="submit">Calculate</button>

</form>
</div>

</body>
</html>
